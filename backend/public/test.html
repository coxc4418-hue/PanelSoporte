<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitio de Demostración - OroDig AI Support</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 30% 20%, #1e1b4b 0%, #0f172a 100%);
      color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      background: linear-gradient(to right, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #8b5cf6;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      background: #7c3aed;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>orodig-col.web.app</h1>
    <p>
      Esta es una demostración de integración del widget flotante. En la esquina inferior derecha verás la burbuja interactiva cargada de forma aislada e independiente desde tu plataforma SaaS centralizada.
    </p>
    <a href="http://localhost:5000/login" target="_blank" class="btn">Abrir Panel de Administración</a>
  </div>

  <!-- OroDig AI Widget Script Embed -->
  <script src="/widget.js"></script>
  <script>
    window.OroDigAI.init({
      apiKey: "ORODIG_SITE_001"
    });
  </script>
</body>
</html>
